<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Waste Segregation Assistant</title>

    <link rel="stylesheet" href="index.css">
</head>
<body>

<div class="container">

    <!-- SDG 12 Logo -->
    <img src="images/sdg12-logo.png" alt="SDG 12 Logo">



    <h1>AI Waste Segregation Assistant</h1>

    <!-- Waste Image -->
  <img src="images/waste-bin.jpg" alt="Waste Bin">

    <input
        type="text"
        id="wasteItem"
        placeholder="Enter Waste Item">

    <button onclick="classifyWaste()">
        Classify Waste
    </button>

    <div id="result"></div>

    <!-- Recycle Image -->
  <img src="images/recycle.png" alt="Recycle">

</div>

<script src="index.js"></script>

</body>
</html>
